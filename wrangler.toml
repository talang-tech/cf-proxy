# ========================================
# Cloudflare Worker 代理配置
# ========================================

name = "cf-proxy-gateway"
main = "src/index.ts"
compatibility_date = "2024-04-05"
compatibility_flags = [
  "nodejs_compat",
  "streams_enable_constructors",
]

# 消费计划配置（更高限制）
usage_model = "bundled"

# ========================================
# 环境变量
# ========================================
[vars]
# 基础配置
ENV = "development"
DEBUG = "true"
LOG_LEVEL = "info"

# 性能配置
MAX_BODY_SIZE = "10737418240"  # 10GB (Cloudflare 付费版)
STREAMING_THRESHOLD = "10485760"  # 10MB 以上启用流式传输
CHUNK_SIZE = "1048576"  # 1MB 分块
REQUEST_TIMEOUT = "300"  # 5 分钟

# 缓存配置
CACHE_TTL = "3600"  # 1 小时
CACHE_MAX_FILE_SIZE = "536870912"  # 512MB

# CORS 配置
CORS_ALLOW_ORIGIN = "*"
CORS_ALLOW_METHODS = "GET,POST,PUT,DELETE,PATCH,OPTIONS,HEAD,CONNECT"
CORS_ALLOW_HEADERS = "*"
CORS_EXPOSE_HEADERS = "*"

# WebSocket 配置
WS_PING_INTERVAL = "30000"  # 30 秒 ping
WS_MAX_PAYLOAD = "104857600"  # 100MB
WS_IDLE_TIMEOUT = "3600"  # 1 小时

# ========================================
# 开发环境
# ========================================
[env.development]
name = "cf-proxy-gateway-dev"
vars = { ENV = "development", DEBUG = "true" }

# ========================================
# 生产环境
# ========================================
[env.production]
name = "cf-proxy-gateway"
vars = { ENV = "production", DEBUG = "false" }

# ========================================
# KV 命名空间（用于缓存、限流等）
# ========================================
# kv_namespaces = [
#   { binding = "PROXY_CACHE", id = "" },
#   { binding = "RATE_LIMIT", id = "" }
# ]

